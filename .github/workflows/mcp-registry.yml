name: mcp-registry

# Publish server.json to the official MCP registry. OIDC proves ownership of
# the io.github.KSym04/* namespace without any interactive login. Triggered
# on tag push, not release-published: releases here are created by the
# release workflow with GITHUB_TOKEN, and GitHub suppresses events from
# GITHUB_TOKEN-authored actions to prevent recursion, so a release trigger
# would never fire.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    # macOS runner for homebrew: the publisher's release-asset names vary by
    # version, so brew is the stable install path.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install mcp-publisher
      - run: mcp-publisher login github-oidc
      - run: mcp-publisher publish
