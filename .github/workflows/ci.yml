name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked
      - run: cargo build --release --locked
      # Ratchet: no new panic sites on the MCP hot path (count can only go down).
      - run: bash scripts/check_hotpath_panics.sh
      # Full read-path smoke test on every OS: active -> stale -> healed, exits
      # non-zero on any unexpected state.
      - run: cargo run --locked -- demo
