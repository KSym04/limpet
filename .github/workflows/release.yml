name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Fast, reliable platforms. The release is gated only on these so a scarce
  # runner can never hold it up.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo test --locked
      - run: cargo build --release --locked --target ${{ matrix.target }}
      # Publish both a raw binary (consumed by `limpet update`) and an archive
      # (for humans), each with a sibling .sha256.
      - name: package (unix)
        if: matrix.archive == 'tar'
        run: |
          cd target/${{ matrix.target }}/release
          cp limpet limpet-${{ matrix.target }}
          shasum -a 256 limpet-${{ matrix.target }} > limpet-${{ matrix.target }}.sha256
          tar czf limpet-${{ matrix.target }}.tar.gz limpet
          shasum -a 256 limpet-${{ matrix.target }}.tar.gz > limpet-${{ matrix.target }}.tar.gz.sha256
      - name: package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Copy-Item limpet.exe limpet-${{ matrix.target }}.exe
          (Get-FileHash limpet-${{ matrix.target }}.exe -Algorithm SHA256).Hash + "  limpet-${{ matrix.target }}.exe" | Out-File limpet-${{ matrix.target }}.exe.sha256 -Encoding ascii
          Compress-Archive -Path limpet.exe -DestinationPath limpet-${{ matrix.target }}.zip
          (Get-FileHash limpet-${{ matrix.target }}.zip -Algorithm SHA256).Hash + "  limpet-${{ matrix.target }}.zip" | Out-File limpet-${{ matrix.target }}.zip.sha256 -Encoding ascii
      - uses: actions/upload-artifact@v4
        with:
          name: limpet-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/limpet-${{ matrix.target }}
            target/${{ matrix.target }}/release/limpet-${{ matrix.target }}.*
          if-no-files-found: error

  # Publish to crates.io. Gated on `build` so a broken binary build blocks the
  # push, which is effectively irreversible (a published version can only be
  # yanked, never overwritten or re-uploaded). `--locked` guarantees the exact
  # Cargo.lock is used. Re-pushing a tag for an already-published version fails
  # here loudly instead of corrupting anything.
  crates-io:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Single job publishes the release once (generating notes inside the build
  # matrix is what previously triplicated the notes).
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # Intel macOS runners are scarce and routinely queue for 15+ minutes, which
  # used to stall the whole release. Build it out of band: it runs after the
  # release is already published and attaches its asset when the runner frees.
  # `continue-on-error` means a stuck or failed Intel build never fails the
  # release.
  macos-x86:
    needs: publish
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: cargo build --release --locked --target x86_64-apple-darwin
      - name: package and attach to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd target/x86_64-apple-darwin/release
          T=x86_64-apple-darwin
          cp limpet limpet-$T
          shasum -a 256 limpet-$T > limpet-$T.sha256
          tar czf limpet-$T.tar.gz limpet
          shasum -a 256 limpet-$T.tar.gz > limpet-$T.tar.gz.sha256
          gh release upload ${{ github.ref_name }} \
            limpet-$T limpet-$T.sha256 limpet-$T.tar.gz limpet-$T.tar.gz.sha256 --clobber
