name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo test --locked
      - run: cargo build --release --locked --target ${{ matrix.target }}
      # Publish both a raw binary (consumed by `limpet update`) and an archive
      # (for humans), each with a sibling .sha256.
      - name: package (unix)
        if: matrix.archive == 'tar'
        run: |
          cd target/${{ matrix.target }}/release
          cp limpet limpet-${{ matrix.target }}
          shasum -a 256 limpet-${{ matrix.target }} > limpet-${{ matrix.target }}.sha256
          tar czf limpet-${{ matrix.target }}.tar.gz limpet
          shasum -a 256 limpet-${{ matrix.target }}.tar.gz > limpet-${{ matrix.target }}.tar.gz.sha256
      - name: package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Copy-Item limpet.exe limpet-${{ matrix.target }}.exe
          (Get-FileHash limpet-${{ matrix.target }}.exe -Algorithm SHA256).Hash + "  limpet-${{ matrix.target }}.exe" | Out-File limpet-${{ matrix.target }}.exe.sha256 -Encoding ascii
          Compress-Archive -Path limpet.exe -DestinationPath limpet-${{ matrix.target }}.zip
          (Get-FileHash limpet-${{ matrix.target }}.zip -Algorithm SHA256).Hash + "  limpet-${{ matrix.target }}.zip" | Out-File limpet-${{ matrix.target }}.zip.sha256 -Encoding ascii
      - uses: actions/upload-artifact@v4
        with:
          name: limpet-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/limpet-${{ matrix.target }}
            target/${{ matrix.target }}/release/limpet-${{ matrix.target }}.*
          if-no-files-found: error

  # Single job publishes the release once. Generating release notes inside the
  # build matrix (one run per platform) is what triplicated the notes: each
  # matrix job re-published the release and re-appended the generated block.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
