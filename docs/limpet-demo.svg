:0} 100% {opacity:0} }.l9 { animation: l9 46.0s steps(1,end) infinite; opacity: 0; }@keyframes l10 { 0% {opacity:0} 36.522% {opacity:0} 37.422% {opacity:1} 57.609% {opacity:1} 58.009% {opacity:0} 100% {opacity:0} }.l10 { animation: l10 46.0s steps(1,end) infinite; opacity: 0; }@keyframes l11 { 0% {opacity:0} 39.565% {opacity:0} 40.464999999999996% {opacity:1} 57.609% {opacity:1} 58.009% {opacity:0} 100% {opacity:0} }.l11 { animation: l11 46.0s steps(1,end) infinite; opacity: 0; }@keyframes l12 { 0% {opacity:0} 41.739% {opacity:0} 42.638999999999996% {opacity:1} 57.609% {opacity:1} 58.009% {opacity:0} 100% {opacity:0} }.l12 { animation: l12 46.0s steps(1,end) infinite; opacity: 0; }@keyframes l13 { 0% {opacity:0} 45.652% {opacity:0} 46.552% {opacity:1} 57.609% {opacity:1} 58.009% {opacity:0} 100% {opacity:0} }.l13 { animation: l13 46.0s steps(1,end) infinite; opacity: 0; }@keyframes l14 { 0% {opacity:0} 45.652% {opacity:0} 46.552% {opacity:1} 57.609% {opacity:1} 58.009% {opacity:0} 100% {opacity:0} }.l14 { animation: l14 46.0s steps(1,end) infinite; opacity: 0; }@keyframes l15 { 0% {opacity:0} 58.913% {opacity:0} 59.812999999999995% {opacity:1} 79.348% {opacity:1} 79.748% {opacity:0} 100% {opacity:0} }.l15 { animation: l15 46.0s steps(1,end) infinite; opacity: 0; }@keyframes l16 { 0% {opacity:0} 62.391% {opacity:0} 63.291% {opacity:1} 79.348% {opacity:1} 79.748% {opacity:0} 100% {opacity:0} }.l16 { animation: l16 46.0s steps(1,end) infinite; opacity: 0; }@keyframes l17 { 0% {opacity:0} 65.87% {opacity:0} 66.77000000000001% {opacity:1} 79.348% {opacity:1} 79.748% {opacity:0} 100% {opacity:0} }.l17 { animation: l17 46.0s steps(1,end) infinite; opacity: 0; }@keyframes l18 { 0% {opacity:0} 68.043% {opacity:0} 68.94300000000001% {opacity:1} 79.348% {opacity:1} 79.748% {opacity:0} 100% {opacity:0} }.l18 { animation: l18 46.0s steps(1,end) infinite; opacity: 0; }@keyframes l19 { 0% {opacity:0} 71.739% {opacity:0} 72.63900000000001% {opacity:1} 79.348% {opacity:1} 79.748% {o