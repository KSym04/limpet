<text x="430" y="29" fill="#8b949e" font-size="12" text-anchor="middle">the anchor lifecycle, real output from limpet 0.13.0</text>
<text class="l0" x="28" y="70" fill="#f0f6fc" font-weight="bold" font-size="14" xml:space="preserve">you  &gt;  why is the batch size 50?</text><text class="l1" x="28" y="100" fill="#58a6ff" font-weight="normal" font-size="14" xml:space="preserve">agent  &gt;  recall("why is the batch size 50?")</text><text class="l2" x="28" y="130" fill="#3fb950" font-weight="normal" font-size="14" xml:space="preserve">  decision . scanner.process_batch . conf 0.80   [active]</text><text class="l3" x="28" y="156" fill="#c9d1d9" font-weight="normal" font-size="14" xml:space="preserve">  "Batch size is 50 because shared hosts kill requests over 30s;</text><text class="l4" x="28" y="178" fill="#c9d1d9" font-weight="normal" font-size="14" xml:space="preserve">   the queue exists so a full scan survives across requests."</text><text class="l5" x="28" y="208" fill="#8b949e" font-weight="normal" font-size="14" xml:space="preserve">  envelope: matched 1 . returned 1 . stale 0</text><text class="l6" x="28" y="244" fill="#f0f6fc" font-weight="normal" font-size="14" xml:space="preserve">agent  &gt;  answered from memory: ~350 tokens, zero file reads,</text><text class="l7" x="28" y="266" fill="#f0f6fc" font-weight="normal" font-size="14" xml:space="preserve">          no re-teaching your own codebase.</text><text class="l8" x="28" y="70" fill="#e3b341" font-weight="normal" font-size="14" xml:space="preserve">$ vim scanner.py        # BATCH_SIZE 50 -&gt; 200, loop rewritten</text><text class="l9" x="28" y="106" fill="#58a6ff" font-weight="normal" font-size="14" xml:space="preserve">agent  &gt;  recall("why is the batch size 50?")</text><text class="l10" x="28" y="136" fill="#d29922" font-weight="bold" font-size="14" xml:space="preserve">  decision . scanner.process_batch . conf 0.48   [stale: body_edited]</text><text class="l11" x="28" y="164" fill="#8b949e" font-weight="normal" font-size="14" xml:space="preserve">  same memory, but limpet noticed the code underneath it changed</text><text class="l12" x="28" y="190" fill="#d29922" font-weight="normal" font-size="14" xml:space="preserve">  envelope: stale 1 . confidence dropped 0.80 -&gt; 0.48</text><text class="l13" x="28" y="226" fill="#f0f6fc" font-weight="normal" font-size="14" xml:space="preserve">agent  &gt;  careful: this decision may be outdated,</text><text class="l14" x="28" y="248" fill="#f0f6fc" font-weight="normal" font-size="14" xml:space="preserve">          process_batch was rewritten since it was stored.</text><text class="l15" x="28" y="70" fill="#e3b341" font-weight="normal" font-size="14" xml:space="preserve">$ git checkout scanner.py        # experiment rolled back</text><text class="l16" x="28" y="106" fill="#58a6ff" font-weight="normal" font-size="14" xml:space="preserve">agent  &gt;  recall("why is the batch size 50?")</text><text class="l17" x="28" y="136" fill="#3fb950" font-weight="bold" font-size="14" xml:space="preserve">  decision . scanner.process_batch   [active]</text><text class="l18" x="28" y="164" fill="#3fb950" font-weight="normal" font-size="14" xml:space="preserve">  envelope: stale 0 . healed, the anchor hash matches again</text><text class="l19" x="28" y="200" fill="#8b949e" font-weight="normal" font-size="14" xml:space="preserve">  nothing ever pretends to be current when it is not.</text><text class="l20" x="340" y="190" fill="#f0f6fc" font-weight="bold" font-size="34" xml:space="preserve">limpet</text><text class="l21" x="250" y="228" fill="#c9d1d9" font-weight="normal" font-size="16" xml:space="preserve">memory for AI coding agents that knows</text><text class="l22" x="340" y="252" fill="#c9d1d9" font-weight="normal" font-size="16" xml:space="preserve">when it has gone stale</text><text class="l23" x="322" y="296" fill="#8b949e" font-weight="normal" font-size="15" xml:space="preserve">github.com/KSym04/limpet</text>
</svg>